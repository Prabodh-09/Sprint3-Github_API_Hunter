<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Detective</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Dev Detective</h1>

        <!-- Search Section -->
        <div class="search-section">
            <input
                type="text"
                id="searchInput"
                placeholder="Enter GitHub Username"
            >

            <button id="searchBtn">
                Search
            </button>
        </div>

        <!-- Battle Mode Toggle -->
        <div class="battle-toggle">
            <label>
                <input type="checkbox" id="battleToggle">
                Battle Mode
            </label>
        </div>

        <!-- Battle Inputs -->
        <div id="battleInputs" class="hidden">
            <input
                type="text"
                id="user1"
                placeholder="First Username"
            >

            <input
                type="text"
                id="user2"
                placeholder="Second Username"
            >

            <button id="battleBtn">
                Battle
            </button>
        </div>

        <!-- Loading State -->
        <div id="loading"></div>

        <!-- Error State -->
        <div id="error"></div>

        <!-- Profile Card -->
        <div id="profileContainer"></div>

        <!-- Repository List -->
        <div id="repoContainer"></div>

        <!-- Battle Result -->
        <div id="battleContainer"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
